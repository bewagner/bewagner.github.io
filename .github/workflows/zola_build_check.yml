name: Zola build check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ZOLA_VERSION: v0.22.1

concurrency:
  group: "build-check-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1

      - name: Copy zola config
        run: cp zola.toml config.toml

      - name: Build Zola + upload Pages artifact
        uses: getzola/github-pages@066755243e69f508fd1a74739fbf1a65f656c790
        with:
          zola_version: ${{ env.ZOLA_VERSION }}
